apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 70.4.2
      helm:
        valueFiles:
          - $taskflow-gitops-manifests/monitoring/kube-prometheus-stack-values.yaml

    - repoURL: https://github.com/masud0932/taskflow-microservices-project.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc # in-cluster URL
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true